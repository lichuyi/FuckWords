<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Love U</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ee;
        --ink: #222831;
        --muted: #59616f;
        --accent: #2f80ed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        width: min(92vw, 680px);
        padding: 56px 24px;
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.5rem, 8vw, 5rem);
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0 auto;
        max-width: 520px;
        color: var(--muted);
        font-size: 1.125rem;
        line-height: 1.7;
      }

      .mark {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Love U<span class="mark">.</span></h1>
      <p>一个很简单的页面，留一句直接又漂亮的话。</p>
    </main>
  </body>
</html>
